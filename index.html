<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Gestor Técnico FTTH</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="themeBtn">☀️</button>
        <h1>📡 Gestor FTTH</h1>
        
        <div id="error" class="error"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('directo')">Color ➔ Número</button>
            <button class="tab-btn" onclick="switchTab('inverso')">Número ➔ Color</button>
        </div>
        
        <div id="tab-directo" class="tab-content active">
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Hilos por Buffer:</label>
                    <select id="nHilos">
                        <option value="6" selected>6 Hilos</option>
                        <option value="8">8 Hilos</option>
                        <option value="12">12 Hilos</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Selecciona Buffer Usado:</label>
                    <div class="color-grid" id="gridBuffer"></div>
                </div>
                
                <div class="form-group">
                    <label>Selecciona Hilo Usado:</label>
                    <div class="color-grid" id="gridHilo"></div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn-secondary" id="limpiarBtn" style="width:100%;">Limpiar Selección</button>
                </div>
            </form>
        </div>

        <div id="tab-inverso" class="tab-content">
            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Hilos por Buffer:</label>
                    <select id="invHilosPorBuffer">
                        <option value="6" selected>6 Hilos</option>
                        <option value="8">8 Hilos</option>
                        <option value="12">12 Hilos</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Número de Hilo Absoluto:</label>
                    <input type="number" id="invNumeroHilo" min="1" placeholder="Escribe el número aquí... (Ej: 24)">
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn-secondary" id="invLimpiarBtn" style="width:100%;">Limpiar Entrada</button>
                </div>
            </form>
        </div>
        
        <div id="resultado" class="resultado">
            <div class="resultado-item">
                <div class="resultado-label">Buffer Identificado</div>
                <div class="resultado-valor"><span id="resultadoBuffer"></span><span id="badgeBuffer" class="color-badge" style="display:none;"></span></div>
            </div>
            <div class="resultado-item">
                <div class="resultado-label">Hilo Identificado</div>
                <div class="resultado-valor"><span id="resultadoHilo"></span><span id="badgeHilo" class="color-badge" style="display:none;"></span></div>
            </div>
            <div class="resultado-item">
                <div class="resultado-label">Número de Hilo Correlativo</div>
                <div class="resultado-valor numero-hilo" id="resultadoNumero"></div>
            </div>
        </div>
        
        <div class="template-section">
            <button id="tplToggle" class="tpl-toggle">🔽 Generar Plantilla FDT</button>
            <div class="template-content">
                <div class="template-row"><label>Puerto:</label><input type="text" id="tplPuerto" placeholder="Ej: 1,2" /></div>
                <div class="template-row"><label>Bandeja:</label><input type="text" id="tplBandeja" placeholder="Ej: 1,2" /></div>
                <div class="template-row"><label>Splitter:</label><input type="text" id="tplSplitter" placeholder="Ej: 1,2" /></div>
                <div class="template-row"><label>FDT Puerto(s) usado(s):</label><input type="text" id="tplPuertosUsados" placeholder="Ej: 1,2,3" /></div>
                <div class="template-row"><label>Closure Puerto(s) usado(s):</label><input type="text" id="tplClosure" placeholder="Ej: 1,2,3" /></div>
                <div class="template-actions">
                    <button type="button" class="btn-primary" id="generarPlantilla">Generar</button>
                    <button type="button" class="btn-secondary" id="copiarPlantilla">Copiar</button>
                </div>
                <textarea id="plantillaSalida" readonly placeholder="Aquí aparecerá la plantilla generada"></textarea>
            </div>
        </div>

        <div class="template-section">
            <button id="tplToggleLiq" class="tpl-toggle">🔽 Generar Plantilla de Liquidación</button>
            <div class="template-content" id="tplContentLiq">
                <div class="template-row"><label>Dirección:</label><input type="text" id="tplDireccion" placeholder="Ej: Av. Próceres..." /></div>
                <div class="template-row"><label>Nombre de Edificio:</label><input type="text" id="tplEdificio" placeholder="Ej: Torre Central" /></div>
                <div class="template-row"><label>Cantidad de Torres:</label><input type="number" id="tplTorres" min="0" placeholder="Ej: 2" /></div>
                <div class="template-row"><label>Cantidad de Pisos:</label><input type="number" id="tplPisos" min="0" placeholder="Ej: 10" /></div>
                <div class="template-row"><label>Dptos. por Piso:</label><input type="number" id="tplDptosPorPiso" min="0" placeholder="Ej: 4" /></div>
                <div class="template-row"><label>Piso donde queda el FAT:</label><input type="text" id="tplPisoFat" placeholder="Ej: 4" /></div>
                <div class="template-row"><label>Ingreso:</label><input type="text" id="tplIngreso" placeholder="Ej: Por calle lateral" /></div>
                <div class="template-row"><label>Cantidad de Sótanos:</label><input type="number" id="tplSotanos" min="0" placeholder="Ej: 1" /></div>

                <hr style="border:none;border-top:1px dashed var(--border-color);margin:12px 0;" />
                <div class="tpl-section-title">Materiales Utilizados</div>
                <div class="template-row"><label>Closure:</label><input type="text" id="tplMatClosure" placeholder="Ej: CL-12" /></div>
                <div class="template-row"><label>Fat:</label><input type="number" id="tplMatFat" min="0" placeholder="Ej: 2" /></div>
                <div class="template-row"><label>Preformados:</label><input type="number" id="tplMatPreformados" /></div>
                <div class="template-row"><label>Etiquetas:</label><input type="number" id="tplMatEtiquetas" /></div>
                <div class="template-row"><label>Cintillos Amarres:</label><input type="number" id="tplMatCintillos" /></div>
                <div class="template-row"><label>Smuv:</label><input type="number" id="tplMatSmuv" /></div>
                <div class="template-row"><label>Cinta Aislante:</label><input type="number" id="tplMatCinta" /></div>
                <div class="template-row"><label>Abrazaderas:</label><input type="number" id="tplMatAbrazaderas" readonly placeholder="Auto desde FAT" /></div>
                <div class="template-row"><label>Tornillos:</label><input type="number" id="tplMatTornillos" readonly placeholder="Auto desde FAT" /></div>
                <div class="template-row"><label>F.O (mts):</label><input type="number" id="tplMatFO" /></div>
                <div class="template-row"><label>Canaletas:</label><input type="number" id="tplMatCanaletas" placeholder="Cantidad de tramos" /></div>
                <div class="template-row"><label>Postes Totales:</label><input type="number" id="tplMatPostes" placeholder="Postes intervenidos" /></div>

                <hr style="border:none;border-top:1px dashed var(--border-color);margin:12px 0;" />
                <div class="tpl-section-title">Datos de Empalme</div>
                <div class="template-row"><label>Número de bandeja:</label><input type="text" id="tplEmpBandeja" placeholder="Ej: Bandeja 1" /></div>
                <div class="template-row"><label>Número de Splitter FDT:</label><input type="text" id="tplEmpSplitter" placeholder="Ej: 1x8 - Spl 2" /></div>
                <div class="template-row"><label>Puertos del Closure usado:</label><input type="text" id="tplEmpPortsClosure" placeholder="Ej: Puerto 3" /></div>

                <hr style="border:none;border-top:1px dashed var(--border-color);margin:12px 0;" />
                <div class="tpl-section-title">Puerto PON de FAT Instalado</div>
                <div class="template-row"><label>Hilo alimentador:</label><input type="text" id="tplPonHilo" placeholder="Ej: Hilo 5 (Verde)" /></div>

                <hr style="border:none;border-top:1px dashed var(--border-color);margin:12px 0;" />
                <div class="tpl-section-title">Cuadrilla y Control</div>
                <div class="template-row"><label>Tec. Empalmador:</label><input type="text" id="tplTecEmpalmador" /></div>
                <div class="template-row"><label>Tec. Liniero:</label><input type="text" id="tplTecLiniero" /></div>
                <div class="template-row"><label>Tec. Ayudante:</label><input type="text" id="tplTecAyudante" /></div>
                <div class="template-row"><label>Supervisor:</label><input type="text" id="tplSupervisor" /></div>
                
                <div class="template-actions">
                    <button type="button" class="btn-primary" id="generarPlantillaLiq">Generar</button>
                    <button type="button" class="btn-secondary" id="copiarPlantillaLiq">Copiar</button>
                </div>
                <textarea id="plantillaSalidaLiq" readonly placeholder="Aquí aparecerá la plantilla de liquidación"></textarea>
            </div>
        </div>
        <div class="footer">D4RK — Gestión Técnica de Fibra © 2026</div>
    </div>
    
    <script src="script/script.js"></script>
</body>
</html>
